  <!-- Polyfill window.storage usando localStorage -->
  <script>
    window.IS_DEMO = true; // Demo pública: deshabilita subida de fotos
    window.storage = {
      get: async (key) => {
        try {
          const v = localStorage.getItem('lw_carta_' + key);
          return v !== null ? { key, value: v } : null;
        } catch(e) { return null; }
      },
      set: async (key, value) => {
        try {
          localStorage.setItem('lw_carta_' + key, value);
          return { key, value };
        } catch(e) { return null; }
      },
      delete: async (key) => {
        try {
          localStorage.removeItem('lw_carta_' + key);
          return { key, deleted: true };
        } catch(e) { return null; }
      },
      list: async (prefix) => {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith('lw_carta_' + (prefix || ''))) {
            keys.push(k.replace('lw_carta_', ''));
          }
        }
        return { keys };
      }
    };
  </script>

// ─── COMPRIMIR IMAGEN CON CANVAS ──────────────────────────────────────────────

async function comprimirImagen(file, maxDim = 560, q = 0.74) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const ratio = Math.min(maxDim / img.width, maxDim / img.height, 1);
        const canvas = document.createElement("canvas");
        canvas.width  = Math.round(img.width  * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", q));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

.ch-nombre{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:700;letter-spacing:-.02em;line-height:1.15;position:relative;z-index:1}
.ch-sub{font-size:.8rem;font-weight:300;color:rgba(255,255,255,.65);margin-top:6px;letter-spacing:.12em;text-transform:uppercase;position:relative;z-index:1}
.ch-strip{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-top:18px;position:relative;z-index:1}
.ch-item{font-size:.75rem;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:5px}

/* ── CARTA BODY ── */
.cb{max-width:680px;margin:0 auto;padding:0 16px 48px}
.cat-sec{margin-top:40px}
.cat-hdr{display:flex;align-items:center;gap:10px;padding-bottom:10px;margin-bottom:4px;border-bottom:2px solid #2C4A3E}
.cat-emoji{font-size:1.1rem}
.cat-nombre{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:600;color:#2C4A3E;letter-spacing:-.01em}

/* ── PLATO ── */
.plato{display:flex;align-items:flex-start;gap:14px;padding:15px 0;border-bottom:1px solid #E8E0D5}
.plato:last-child{border-bottom:none}
.plato-info{flex:1;min-width:0}
.plato-row1{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.plato-nombre{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:#1A1A1A;line-height:1.3}
.badge-chef{background:#2C4A3E;color:#fff;font-size:.6rem;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;margin-top:2px}
.plato-desc{font-size:.8rem;color:#6A6258;line-height:1.55;margin-bottom:8px}
.plato-precio{font-size:1.05rem;font-weight:600;color:#9A7010;font-variant-numeric:tabular-nums;white-space:nowrap;margin-bottom:7px}
.plato-precio-col{flex-shrink:0;text-align:right;margin-top:2px}
.al-row{display:flex;flex-wrap:wrap;gap:4px}

/* ── FOTO PLATO (carta pública) ── */
.plato-foto{width:90px;height:90px;object-fit:cover;border-radius:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.12);cursor:pointer;transition:transform .15s}
.plato-foto:hover{transform:scale(1.04)}
@media(max-width:420px){.plato-foto{width:72px;height:72px}}

/* ── LIGHTBOX ── */
.lb-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;cursor:pointer;backdrop-filter:blur(4px)}
.lb-img{max-width:90vw;max-height:85vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lb-close{position:absolute;top:16px;right:20px;color:#fff;font-size:1.8rem;cursor:pointer;line-height:1;background:rgba(0,0,0,.4);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center}

/* ── ALÉRGENO BADGE ── */
.al-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:#fff;cursor:help;position:relative;flex-shrink:0;transition:transform .1s}
.al-badge:hover{transform:scale(1.2)}
.al-tip{display:none;position:absolute;bottom:27px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;font-size:.68rem;padding:4px 9px;border-radius:5px;white-space:nowrap;z-index:20;pointer-events:none;font-family:'Inter',sans-serif;font-weight:400}
.al-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#1A1A1A}
.al-badge:hover .al-tip{display:block}

/* ── LEYENDA ALÉRGENOS ── */
.leyenda{background:#fff;border:1px solid #E0D8CF;border-radius:12px;padding:22px;margin-top:40px}
.leyenda-tit{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:600;color:#2C4A3E;margin-bottom:14px}
.leyenda-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px}
.leyenda-item{display:flex;align-items:center;gap:8px;font-size:.75rem;color:#555}
.leyenda-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:#fff;flex-shrink:0}
.nota-al{margin-top:16px;padding:14px;background:#FFFBF2;border-left:3px solid #C8860A;border-radius:0 8px 8px 0;font-size:.76rem;color:#6A5A30;line-height:1.55}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

const fmt   = n => Number(n).toFixed(2).replace(".", ",") + " €";
const getAl = id => ALERGENOS.find(a => a.id === id);

// ─── COMPONENTES PEQUEÑOS ─────────────────────────────────────────────────────

function AlBadge({ id, size = 22 }) {
  const a = getAl(id);
  if (!a) return null;
  return (
    <span className="al-badge" style={{ background: a.color, width: size, height: size }}>
      <span style={{ fontSize: size * .37 }}>{a.letra}</span>
      <span className="al-tip">{a.nombre}</span>
    </span>
  );
}

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

// ─── LIGHTBOX ────────────────────────────────────────────────────────────────

function Lightbox({ src, alt, onClose }) {
  useEffect(() => {
    const handler = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);
  return (
    <div className="lb-ov" onClick={onClose}>
      <button className="lb-close" onClick={onClose}>✕</button>
      <img className="lb-img" src={src} alt={alt} onClick={e => e.stopPropagation()} />
    </div>
  );
}

// ─── ZONA UPLOAD FOTO ─────────────────────────────────────────────────────────

function FotoUpload({ valor, onChange }) {
  const inputRef = useRef();
  const [cargando, setCargando] = useState(false);

  const handleFile = async e => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) return;
    setCargando(true);
    try {
      const b64 = await comprimirImagen(file);
      onChange(b64);
    } catch (err) { console.error(err); }
    setCargando(false);
    e.target.value = "";
  };

  return (
    <div>
      <input ref={inputRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handleFile} />
      <div
        className={`foto-zone${valor ? " has-foto" : ""}`}
        onClick={() => !cargando && inputRef.current.click()}
      >
        {cargando && (
          <div style={{ textAlign:"center", color:"#888" }}>
            <div style={{ fontSize:"1.4rem", marginBottom:4 }}>⏳</div>
            <div style={{ fontSize:".78rem" }}>Comprimiendo imagen...</div>
          </div>
        )}
        {!cargando && !valor && (
          <>
            <div className="foto-zone-icon">📷</div>
            <div className="foto-zone-text">
              Pulsa para subir foto<br />
              <span style={{ fontSize:".7rem", color:"#BBB" }}>JPG, PNG, WEBP · se comprime automáticamente</span>
            </div>
          </>
        )}
        {!cargando && valor && (
          <>
            <img src={valor} alt="preview" style={{ width:"100%", height:"100%", objectFit:"cover", borderRadius:8 }} />
            <button className="foto-del-btn" onClick={e => { e.stopPropagation(); onChange(null); }} title="Eliminar foto">✕</button>
            <span className="foto-change-hint">📷 Cambiar foto</span>
          </>
        )}
      </div>
    </div>
  );
}

// ─── MODAL PLATO ──────────────────────────────────────────────────────────────

function ModalPlato({ plato, fotoInicial, categorias, onSave, onClose }) {
  const isNew = !plato.id;
  const [f, setF] = useState({
    id:          plato.id || `p${Date.now()}`,
    categoriaId: plato.categoriaId || categorias[0]?.id || "",
    nombre:      plato.nombre      || "",
    descripcion: plato.descripcion || "",
    precio:      plato.precio      || "",
    alergenos:   plato.alergenos   || [],
    destacado:   plato.destacado   || false,
    activo:      plato.activo      !== false,
  });
  // foto: undefined=sin cambio, null=eliminar, string=nueva
  const [foto, setFoto] = useState(fotoInicial ?? undefined);
  const [fotoChanged, setFotoChanged] = useState(false);

  const set = (k, v) => setF(p => ({ ...p, [k]: v }));
  const toggleAl = id => set("alergenos", f.alergenos.includes(id) ? f.alergenos.filter(a => a !== id) : [...f.alergenos, id]);

  const handleFotoChange = v => { setFoto(v); setFotoChanged(true); };

  const ok = () => {
    if (!f.nombre.trim()) return;
    const p = parseFloat(String(f.precio).replace(",", "."));
    if (isNaN(p) || p < 0) return;
    onSave({ ...f, precio: p }, fotoChanged ? foto : undefined);
  };

  return (
    <div className="modal-ov" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-bx">
        <div className="modal-tit">{isNew ? "Nuevo plato" : "Editar plato"}</div>

        {/* Foto — oculta en modo demo */}
        {!window.IS_DEMO && (
          <div className="ff">
            <label className="fl">Foto del plato</label>
            <FotoUpload valor={foto ?? null} onChange={handleFotoChange} />
          </div>
        )}

        <div className="fr">
          <div className="ff">
            <label className="fl">Nombre del plato *</label>
            <input className="fi" value={f.nombre} onChange={e => set("nombre", e.target.value)} placeholder="Nombre visible en carta" autoFocus />
          </div>
          <div className="ff">
            <label className="fl">Categoría</label>
            <select className="sel-input" value={f.categoriaId} onChange={e => set("categoriaId", e.target.value)}>
              {categorias.map(c => <option key={c.id} value={c.id}>{c.emoji} {c.nombre}</option>)}
            </select>
          </div>
        </div>

        <div className="ff">
          <label className="fl">Descripción</label>
          <textarea className="fi fi-ta" rows={3} value={f.descripcion} onChange={e => set("descripcion", e.target.value)} placeholder="Ingredientes, preparación, origen..." />
        </div>

        <div className="fr">
          <div className="ff">
            <label className="fl">Precio (€ con IVA) *</label>
            <input className="fi" type="number" step="0.5" min="0" value={f.precio} onChange={e => set("precio", e.target.value)} placeholder="0.00" />
          </div>
          <div className="ff" style={{ display:"flex", flexDirection:"column", justifyContent:"flex-end" }}>
            <label className="chk-label"><input type="checkbox" checked={f.destacado} onChange={e => set("destacado", e.target.checked)} /> ⭐ Recomendación del chef</label>
            <label className="chk-label" style={{ marginTop:6 }}><input type="checkbox" checked={f.activo} onChange={e => set("activo", e.target.checked)} /> ✅ Visible en carta</label>
          </div>
        </div>

        <div className="ff">
          <label className="fl">Alérgenos presentes <span style={{ color:"#999", fontWeight:400 }}>(pulsa para activar)</span></label>
          <div className="al-chips">
            {ALERGENOS.map(a => (
              <div key={a.id} className={`al-chip${f.alergenos.includes(a.id) ? " on" : ""}`}
                style={f.alergenos.includes(a.id) ? { background: a.color } : {}}
                onClick={() => toggleAl(a.id)}
              >
                <div className="chip-dot" style={{ background: a.color }} />{a.nombre}
              </div>
            ))}
          </div>
        </div>

        <div className="modal-acts">
          <button className="btn btn-sec" onClick={onClose}>Cancelar</button>
          <button className="btn btn-pri" onClick={ok}>{isNew ? "Añadir plato" : "Guardar"}</button>
        </div>
      </div>
    </div>
  );
}

// ─── PANEL ADMIN ──────────────────────────────────────────────────────────────

function PanelAdmin({ data, fotos, setData, setFotos, onLogout, onVerCarta, showToast }) {
  const [tab,   setTab]   = useState("platos");
  const [catF,  setCatF]  = useState("all");
  const [modal, setModal] = useState(null);
  const [infoF, setInfoF] = useState({ ...data.restaurante });

  const setInfo = (k, v) => setInfoF(p => ({ ...p, [k]: v }));

  const guardarInfo = () => {
    setData(d => ({ ...d, restaurante: infoF }));
    showToast("✅ Información guardada");
  };

  const toggleActivo = id => setData(d => ({ ...d, platos: d.platos.map(p => p.id === id ? { ...p, activo: !p.activo } : p) }));

  const delPlato = id => {
    if (!confirm("¿Eliminar este plato de la carta?")) return;
    setData(d => ({ ...d, platos: d.platos.filter(p => p.id !== id) }));
    window.storage.delete(`carta-img-${id}`).catch(() => {});
    setFotos(f => { const n = { ...f }; delete n[id]; return n; });
    showToast("🗑️ Plato eliminado");
  };

  const saveP = (plato, foto) => {
    // foto: undefined=no cambió, null=eliminar, string=nueva/actualizada
    setData(d => {
      const existe = d.platos.some(p => p.id === plato.id);
      return { ...d, platos: existe ? d.platos.map(p => p.id === plato.id ? plato : p) : [...d.platos, plato] };
    });
    if (foto !== undefined) {
      if (foto) {
        window.storage.set(`carta-img-${plato.id}`, foto).catch(() => {});
        setFotos(f => ({ ...f, [plato.id]: foto }));
      } else {
        window.storage.delete(`carta-img-${plato.id}`).catch(() => {});
        setFotos(f => { const n = { ...f }; delete n[plato.id]; return n; });
      }
    }
    setModal(null);
    showToast("✅ Plato guardado");
  };

  const platosFilt = catF === "all" ? data.platos : data.platos.filter(p => p.categoriaId === catF);

  return (
    <div className="adm-wrap">
      <style>{CSS}</style>
      <div className="adm-hdr">
        <div className="adm-tit">🍽️ Gestión de carta</div>
        <div style={{ display:"flex", gap:8 }}>
          <button className="btn btn-sec btn-sm" onClick={onVerCarta}>← Ver carta</button>
          <button className="btn btn-sec btn-sm" onClick={onLogout}>Salir</button>
        </div>
      </div>

      <div className="adm-body">
        <div className="tabs">
          <button className={`tab-btn${tab==="platos"?" act":""}`} onClick={() => setTab("platos")}>🍽️ Platos ({data.platos.length})</button>
          <button className={`tab-btn${tab==="info"?" act":""}`} onClick={() => setTab("info")}>ℹ️ Datos del restaurante</button>
        </div>

        {tab === "platos" && (
          <>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10, marginBottom:14, flexWrap:"wrap" }}>
              <div className="cat-filters">
                <div className={`cf${catF==="all"?" on":""}`} onClick={() => setCatF("all")}>Todos</div>
                {data.categorias.map(c => (
                  <div key={c.id} className={`cf${catF===c.id?" on":""}`} onClick={() => setCatF(c.id)}>{c.emoji} {c.nombre}</div>
                ))}
              </div>
              <button className="btn btn-pri btn-sm" onClick={() => setModal({ plato:{}, foto:null })}>+ Nuevo plato</button>
            </div>

            <div className="card">
              {platosFilt.length === 0 && <div className="empty">Sin platos en esta categoría</div>}
              {platosFilt.map(p => {
                const cat  = data.categorias.find(c => c.id === p.categoriaId);
                const foto = fotos[p.id] || p.fotoDemo || null;
                return (
                  <div key={p.id} className="adm-plato" style={{ opacity: p.activo ? 1 : .5 }}>
                    <button className={`tog${p.activo?" on":""}`} onClick={() => toggleActivo(p.id)} title={p.activo ? "Visible — click para ocultar" : "Oculto — click para mostrar"} />
                    {foto
                      ? <img className="adm-plato-thumb" src={foto} alt={p.nombre} />
                      : <div className="adm-plato-thumb-empty">🍽️</div>
                    }
                    <div className="adm-plato-info">
                      <div className="adm-plato-nombre">{p.nombre}{p.destacado ? " ⭐" : ""}</div>
                      <div className="adm-plato-meta">
                        {cat?.emoji} {cat?.nombre} · {fmt(p.precio)}
                        {p.alergenos.length > 0 && ` · ${p.alergenos.length} alérg.`}
                        {!p.activo && " · OCULTO"}
                        {foto && " · 📷"}
                      </div>
                    </div>
                    <div className="adm-plato-acts">
                      <button className="btn btn-sec btn-sm" onClick={() => setModal({ plato:p, foto })}>✏️ Editar</button>
                      <button className="btn btn-del btn-sm" onClick={() => delPlato(p.id)}>🗑️</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {tab === "info" && (
          <div className="card">
            <div className="card-tit">Datos visibles en la carta</div>
            <div className="fr">
              <div className="ff"><label className="fl">Nombre del restaurante</label><input className="fi" value={infoF.nombre} onChange={e => setInfo("nombre", e.target.value)} /></div>
              <div className="ff"><label className="fl">Subtítulo / Especialidad</label><input className="fi" value={infoF.subtitulo} onChange={e => setInfo("subtitulo", e.target.value)} /></div>
            </div>
            <div className="fr">
              <div className="ff"><label className="fl">Teléfono</label><input className="fi" value={infoF.telefono} onChange={e => setInfo("telefono", e.target.value)} /></div>
              <div className="ff"><label className="fl">Horario</label><input className="fi" value={infoF.horario} onChange={e => setInfo("horario", e.target.value)} /></div>
            </div>
            <div className="ff"><label className="fl">Dirección</label><input className="fi" value={infoF.direccion} onChange={e => setInfo("direccion", e.target.value)} /></div>
            <div className="ff"><label className="fl">Aviso de alérgenos</label><textarea className="fi fi-ta" rows={3} value={infoF.alergenos_nota} onChange={e => setInfo("alergenos_nota", e.target.value)} /></div>
            <div className="ff"><label className="fl">Nota sobre precios</label><input className="fi" value={infoF.ivaNota} onChange={e => setInfo("ivaNota", e.target.value)} /></div>
            <div style={{ textAlign:"right", marginTop:6 }}><button className="btn btn-pri" onClick={guardarInfo}>Guardar cambios</button></div>
          </div>
        )}
      </div>

      {modal !== null && (
        <ModalPlato
          plato={modal.plato}
          fotoInicial={modal.foto}
          categorias={data.categorias}
          onSave={saveP}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────

function Login({ onLogin }) {
  const [pass, setPass] = useState("");
  const [err,  setErr]  = useState(false);
  const ok = () => { if (pass === "demo1234") onLogin(); else setErr(true); };
  return (
    <div className="login-bg">
      <style>{CSS}</style>
      <div className="login-card">
        <div className="login-logo">🍽️ Carta Digital</div>
        <div className="login-sub">Panel de gestión · Limonada Web</div>
        <div className="ff">
          <label className="fl">Contraseña de acceso</label>
          <input className="fi" type="password" value={pass} autoFocus
            onChange={e => { setPass(e.target.value); setErr(false); }}
            onKeyDown={e => e.key === "Enter" && ok()}
            placeholder="••••••••"
          />
          {err && <div className="login-err">Contraseña incorrecta.</div>}
        </div>
        <button className="btn btn-pri btn-full" onClick={ok}>Entrar al panel</button>
        <div className="login-hint">Demo: contraseña <strong style={{ color:"#999" }}>demo1234</strong></div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [mode,    setMode]    = useState("carta");
  const [data,    setData]    = useState(null);
  const [fotos,   setFotos]   = useState({});
  const [loading, setLoading] = useState(true);
  const [isAdmin, setIsAdmin] = useState(false);
  const [toast,   setToast]   = useState(null);

  useEffect(() => {
    (async () => {
      try {
        // 1. Cargar datos de carta
        let cartaData = DATOS_DEMO;
        try {
          const r = await window.storage.get("carta-lw-v1");
          if (r) cartaData = JSON.parse(r.value);
        } catch {}

        // 2. Cargar fotos en paralelo
        const fotosMap = {};
        await Promise.all(
          cartaData.platos.map(async p => {
            try {
              const r = await window.storage.get(`carta-img-${p.id}`);
              if (r) fotosMap[p.id] = r.value;
            } catch {}
          })
        );

        setData(cartaData);
        setFotos(fotosMap);
      } catch { setData(DATOS_DEMO); }
      setLoading(false);
    })();
  }, []);

  const handleSetData = useCallback(updater => {
    setData(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      window.storage.set("carta-lw-v1", JSON.stringify(next)).catch(() => {});
      return next;
    });
  }, []);

  if (loading) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#F7F3EE", flexDirection:"column", gap:12, fontFamily:"Inter,sans-serif", color:"#2C4A3E" }}>
      <style>{CSS}</style>
      <div style={{ fontSize:"2rem" }}>🍽️</div>
      <div style={{ fontSize:".9rem" }}>Cargando carta...</div>
    </div>
  );

  return (
    <>
      {mode === "carta" && (
        <CartaPublica data={data} fotos={fotos} onAdmin={() => setMode(isAdmin ? "admin" : "login")} />
      )}
      {mode === "login" && (
        <Login onLogin={() => { setIsAdmin(true); setMode("admin"); }} />
      )}
      {mode === "admin" && (
        <PanelAdmin
          data={data}
          fotos={fotos}
          setData={handleSetData}
          setFotos={setFotos}
          onLogout={() => { setIsAdmin(false); setMode("carta"); }}
          onVerCarta={() => setMode("carta")}
          showToast={msg => setToast(msg)}
        />
      )}
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

  </script>
</body>
</html>
